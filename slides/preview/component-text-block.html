<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F7F7F5; padding: 24px 28px; font-family: 'Inter', sans-serif; }
.blocks { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.block { background: #fff; padding: 20px 22px; border: 1px solid rgba(0,0,0,0.05); }
.block-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #A8A8A8; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="blocks">
    <div class="block">
      <div class="block-label">Statement</div>
      <div style="font-family:'Instrument Serif',serif;font-size:26px;letter-spacing:-0.05em;line-height:0.95;color:#000;">Beyond silence,<br>we build the eternal.</div>
    </div>
    <div class="block">
      <div class="block-label">Expansion</div>
      <div style="font-family:'Instrument Serif',serif;font-size:20px;letter-spacing:-0.04em;line-height:1.05;color:#000;margin-bottom:10px;">This is one idea.</div>
      <div style="font-size:13px;font-weight:300;line-height:1.55;color:#6F6F6F;letter-spacing:-0.01em;">And this is one supporting line. No more than two blocks of text per frame.</div>
    </div>
    <div class="block" style="background:#000;">
      <div class="block-label" style="color:#6F6F6F;">Fragment (dark)</div>
      <div style="font-family:'Instrument Serif',serif;font-size:20px;letter-spacing:-0.04em;line-height:1.4;color:#fff;">We build<br>for those<br>who stay.</div>
    </div>
    <div class="block">
      <div class="block-label">Caption / Label</div>
      <div style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#A8A8A8;margin-bottom:8px;">Origin · I</div>
      <div style="font-family:'Instrument Serif',serif;font-size:20px;letter-spacing:-0.04em;color:#000;">Aethera®</div>
    </div>
  </div>
</body>
</html>
