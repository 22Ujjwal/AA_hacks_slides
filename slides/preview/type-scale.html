<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; padding: 20px 28px; }
.row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; }
.meta { min-width: 130px; font-family: 'Inter', sans-serif; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #A8A8A8; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="row"><div class="meta">3xl · 72–128px</div><div style="font-family:'Instrument Serif',serif;font-size:48px;letter-spacing:-0.06em;line-height:0.95;color:#000;">Aethera</div></div>
  <div class="row"><div class="meta">2xl · 48–80px</div><div style="font-family:'Instrument Serif',serif;font-size:36px;letter-spacing:-0.05em;line-height:0.95;color:#000;">Silence</div></div>
  <div class="row"><div class="meta">xl · 32–48px</div><div style="font-family:'Instrument Serif',serif;font-size:28px;letter-spacing:-0.04em;line-height:1.05;color:#000;">We build <em>the eternal.</em></div></div>
  <div class="row"><div class="meta">lg · 22–32px</div><div style="font-family:'Instrument Serif',serif;font-size:22px;letter-spacing:-0.03em;color:#000;">Past the noise.</div></div>
  <div class="row"><div class="meta">md · 18–22px</div><div style="font-family:'Inter',sans-serif;font-size:19px;font-weight:400;letter-spacing:-0.01em;color:#000;">One sentence. Centered.</div></div>
  <div class="row"><div class="meta">base · 16–18px</div><div style="font-family:'Inter',sans-serif;font-size:16px;font-weight:300;line-height:1.55;color:#6F6F6F;">Remove everything that feels obvious.</div></div>
  <div class="row"><div class="meta">sm · 14–16px</div><div style="font-family:'Inter',sans-serif;font-size:14px;font-weight:300;color:#6F6F6F;">Supporting text, restrained.</div></div>
  <div class="row"><div class="meta">xs · 12–14px</div><div style="font-family:'Inter',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.08em;text-transform:uppercase;color:#A8A8A8;">CAPTION · LABEL</div></div>
</body>
</html>
