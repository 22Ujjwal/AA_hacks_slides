<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; padding: 24px 32px; font-family: 'Inter', sans-serif; }
.label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #A8A8A8; margin-bottom: 8px; }
.frame { border: 1px solid rgba(0,0,0,0.08); background: #F7F7F5; display: flex; align-items: center; justify-content: center; }
.center-field { width: 65%; text-align: center; }
</style>
</head>
<body>
  <div class="label">Content within calm center field — 65% width, floating in negative space</div>
  <div class="frame" style="height: 100px;">
    <div class="center-field">
      <div style="font-family:'Instrument Serif',serif; font-size:22px; letter-spacing:-0.04em; color:#000; line-height:1.05;">Beyond <em>silence</em>, we build <em>the eternal.</em></div>
      <div style="font-size:11px; font-weight:300; color:#6F6F6F; margin-top:8px; letter-spacing:-0.01em;">One idea. One frame. Nothing more.</div>
    </div>
  </div>
</body>
</html>
