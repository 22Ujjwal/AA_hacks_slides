<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; padding: 28px 32px; }
.label { font-family: sans-serif; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #A8A8A8; margin-bottom: 6px; }
.specimen { font-family: 'Instrument Serif', Georgia, serif; color: #000; }
.row { margin-bottom: 18px; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Display — 72px / −0.06em / lh 0.95</div>
    <div class="specimen" style="font-size:56px; letter-spacing:-0.06em; line-height:0.95;">Beyond silence.</div>
  </div>
  <div class="row">
    <div class="label">Heading — 40px / −0.04em / italic contrast</div>
    <div class="specimen" style="font-size:36px; letter-spacing:-0.04em; line-height:1.05;">We build <em>the eternal.</em></div>
  </div>
  <div class="row">
    <div class="label">Fragment — 24px / poetic structure</div>
    <div class="specimen" style="font-size:22px; letter-spacing:-0.03em; line-height:1.3;">We build<br>for those<br>who stay.</div>
  </div>
</body>
</html>
