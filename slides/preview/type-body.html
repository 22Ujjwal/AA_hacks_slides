<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; padding: 28px 32px; font-family: 'Inter', sans-serif; }
.label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #A8A8A8; margin-bottom: 5px; }
.row { margin-bottom: 18px; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Body — 16px / weight 300 / lh 1.55</div>
    <div style="font-size:16px; font-weight:300; line-height:1.55; color:#6F6F6F; letter-spacing:-0.01em;">Remove everything that feels obvious. Let spacing carry meaning. Treat text like sculpture, not content.</div>
  </div>
  <div class="row">
    <div class="label">Label — 12px / weight 400 / wide tracking / uppercase</div>
    <div style="font-size:12px; font-weight:400; letter-spacing:0.12em; text-transform:uppercase; color:#6F6F6F;">Aethera® · Design System · 2026</div>
  </div>
  <div class="row">
    <div class="label">Caption — 10px / wide tracking / uppercase</div>
    <div style="font-size:10px; font-weight:400; letter-spacing:0.08em; text-transform:uppercase; color:#A8A8A8;">Section one · origin</div>
  </div>
</body>
</html>
